<!DOCTYPE html>
<html>
<head>
  <title>NEU Library</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">NEU Library Visitor System</div>

<h2>Library Login</h2>

<div class="card">
  <input type="text" id="name" placeholder="Enter Name">
  <input type="text" id="program" placeholder="Enter Program">
  <input type="email" id="email" placeholder="Enter Email">

  <select id="reason">
    <option value="Reading">Reading</option>
    <option value="Research">Research</option>
    <option value="Computer Use">Computer Use</option>
    <option value="Meeting">Meeting</option>
  </select>

  <select id="role">
    <option value="visitor">Visitor</option>
    <option value="admin">Admin</option>
  </select>

  <button onclick="login()">Enter Library</button>
</div>

<h3 id="message"></h3>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "neu-library-system-7ff45.firebaseapp.com",
  projectId: "neu-library-system-7ff45",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = async function () {
  const name = document.getElementById("name").value;
  const program = document.getElementById("program").value;
  const email = document.getElementById("email").value;
  const reason = document.getElementById("reason").value;
  const role = document.getElementById("role").value;

  if (!name || !program || !email) {
    alert("Please fill in all fields");
    return;
  }

  const adminEmails = ["jcesperanza@neu.edu.ph"];

  if (role === "admin") {
    if (!adminEmails.includes(email)) {
      alert("Access denied. Only admins can log in as admin.");
      return;
    }
    window.location.href = "admin.html";
    return;
  }

  try {
    const visitorsRef = collection(db, "visitors");
    const querySnapshot = await getDocs(visitorsRef);
    let isBlocked = false;

    querySnapshot.forEach((doc) => {
      const data = doc.data();
      if (data.email === email && data.blocked) {
        isBlocked = true;
      }
    });

    if (isBlocked) {
      alert("You are not allowed to use the NEU Library.");
      return;
    }

    await addDoc(visitorsRef, {
      name,
      program,
      email,
      reason,
      time: new Date(),
      blocked: false
    });

    document.getElementById("message").innerText =
      `Welcome ${name} (${program}) to NEU Library!`;

    setTimeout(() => {
      location.reload();
    }, 3000);

  } catch (error) {
    console.error(error);
    alert("Error saving data");
  }
};
</script>

</body>
</html>
